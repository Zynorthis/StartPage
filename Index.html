<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta title="Start Page">
    <meta name="Author" content="Jacob Taylor">
    <link rel="stylesheet" href="src/styles/styles.css">
</head>
<body>
    <section id="left-content-zone">
        <div class="content-zone">
            <div id="welcome-message">Hello, Zynorthis</div>
        </div>
        <br />
        <div class="content-zone date-time">
            <div id="time">12:00:00 AM</div>
            <div id="date">12.31.20</div>
            <div id="day">Monday</div>
        </div>
        <br />
        <div class="content-zone">
            <div class="weather">
                <p>Weather Currently Unavailable.</p>
            </div>
        </div>
    </section>
    <section id="center-content-zone">
        <div class="content-zone">
            <div class="quicklinks">
                <h2>Quick Links</h2>
                <div id="link-content"></div>
            </div>
        </div>
    </section>
    <section id="right-content-zone">
        <div class="content-zone">
            <div class="feeds">
                <h2>Content Feed</h2>
                <p>Place Holder RSS Feeds</p>
            </div>
        </div>
    </section>
</body>
<script src="src/scripts/variables.js"></script>
<script src="src/scripts/consoleService.js"></script>
<script src="src/scripts/weatherService.js"></script>
<script src="src/scripts/app.js"></script>
</html>
